name: Java Format

# Only the exact lines a pull request edits are checked: the Eclipse formatter
# (dev/CodeStyle_eclipse.xml) is applied and the job fails only if it would
# change a line the PR touched. The existing tree is not yet fully
# formatter-clean, so validating whole files (let alone the whole tree) would
# fail unrelated PRs; scoping to the edited lines keeps the check actionable and
# lets the codebase converge line-by-line.

on:
  pull_request:
    paths:
      - '**/*.java'
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  java_format:
    name: Java Format Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Setup Java 17 adopt
      uses: actions/setup-java@v5
      with:
        distribution: adopt
        java-version: '17'
        cache: 'maven'

    - name: Check formatting of PR-edited lines
      env:
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
      run: |
        # Fails only if the Eclipse formatter would change a line this PR edited.
        # See dev/format_changed.py for the line-scoping logic.
        if ! python3 dev/format_changed.py --check "$BASE_SHA"; then
          echo "::error::Some lines edited by this PR are not formatted per dev/CodeStyle_eclipse.xml."
          echo "Fix only your edited lines locally and commit the result:"
          echo ""
          echo "  dev/format-changed.sh"
          echo ""
          echo "(Do NOT run a bare 'mvn formatter:format' -- it reformats the whole tree.)"
          exit 1
        fi
