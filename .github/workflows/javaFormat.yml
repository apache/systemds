name: Java Format

# Only the Java files changed by a pull request are checked: the Eclipse
# formatter (dev/CodeStyle_eclipse.xml) is applied to them and the job fails if
# that produces any change. The existing tree is not yet fully formatter-clean,
# so validating everything would fail unrelated PRs; scoping to the diff keeps
# the check actionable and lets the codebase converge file-by-file.

on:
  pull_request:
    paths:
      - '**/*.java'
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  java_format:
    name: Java Format Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Setup Java 17 adopt
      uses: actions/setup-java@v5
      with:
        distribution: adopt
        java-version: '17'
        cache: 'maven'

    - name: Determine changed Java files
      id: changed
      env:
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
      run: |
        # PR changes = diff between the merge-base and HEAD, limited to still
        # present (.java) files under the two maven source roots.
        INCLUDES=$(git diff --name-only --diff-filter=ACMR "$BASE_SHA"...HEAD \
          | grep -E '^src/(main|test)/java/.+\.java$' \
          | sed -E 's#^src/(main|test)/java/##' \
          | paste -sd, - || true)
        echo "includes=$INCLUDES" >> "$GITHUB_OUTPUT"
        if [ -z "$INCLUDES" ]; then
          echo "No changed Java source files to check."
        else
          echo "Checking formatting of:"
          echo "$INCLUDES" | tr ',' '\n' | sed 's/^/  /'
        fi

    - name: Apply Eclipse formatter to changed files
      if: steps.changed.outputs.includes != ''
      run: |
        mvn -ntp -B \
          net.revelc.code.formatter:formatter-maven-plugin:2.24.1:format \
          -Dconfigfile="$PWD/dev/CodeStyle_eclipse.xml" \
          -Dmaven.compiler.source=17 -Dmaven.compiler.target=17 \
          -Dformatter.includes="${{ steps.changed.outputs.includes }}"

    - name: Fail if formatting changed anything
      if: steps.changed.outputs.includes != ''
      run: |
        if git diff --quiet; then
          echo "All changed Java files are correctly formatted."
          exit 0
        fi
        echo "::error::Some changed Java files are not formatted per dev/CodeStyle_eclipse.xml."
        echo "Format only your changed files locally and commit the result:"
        echo ""
        echo "  dev/format-changed.sh"
        echo ""
        echo "(Do NOT run a bare 'mvn formatter:format' -- it reformats the whole tree.)"
        echo ""
        echo "Required formatting changes (apply this diff):"
        git --no-pager diff
        exit 1
