name: json_extraction

# available sources:
#   - json_struct: HuggingFace MasterControlAIML/JSON-Unstructured-Structured
#   - ner: CoNLL-2003 NER dataset (named entity extraction)
#
# note: NER mode uses entity-level F1 scoring (threshold >= 0.5).
# ner uses CoNLL-2003 named entity recognition -- a standard NLP benchmark.
dataset:
  source: ner
  n_samples: 50

generation:
  max_tokens: 256
  temperature: 0.0
  top_p: 0.9

openai:
  model: gpt-4.1-mini
  max_output_tokens: 256
  temperature: 0.0
  top_p: 0.9
  streaming: true
  max_retries: 5
  base_sleep_s: 0.5
