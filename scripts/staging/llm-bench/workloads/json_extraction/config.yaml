name: json_extraction

# Uses CoNLL-2003 NER dataset (named entity recognition).
# Entity-level F1 scoring (threshold >= 0.5).
dataset:
  source: ner
  n_samples: 50

generation:
  max_tokens: 256
  temperature: 0.0
  top_p: 0.9

openai:
  model: gpt-4.1-mini
  max_output_tokens: 256
  temperature: 0.0
  top_p: 0.9
  streaming: true
  max_retries: 5
  base_sleep_s: 0.5
