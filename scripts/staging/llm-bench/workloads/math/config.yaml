name: math

# available sources: gsm8k (GSM8K dataset)
dataset:
  source: gsm8k
  n_samples: 50

generation:
  max_tokens: 512
  temperature: 0.0
  top_p: 0.9

openai:
  model: gpt-4.1-mini
  max_output_tokens: 512
  temperature: 0.0
  top_p: 0.9
  streaming: true
  max_retries: 5
  base_sleep_s: 0.5
